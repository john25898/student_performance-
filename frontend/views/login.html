<div
  class="fixed inset-0 bg-slate-900 z-50 flex flex-col justify-center items-center sidebar-gradient animate-fade relative px-4"
>
  <div class="text-center mb-10">
    <div
      class="w-20 h-20 bg-blue-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-2xl shadow-blue-500/50"
    >
      <svg
        class="w-10 h-10 text-white"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
        ></path>
      </svg>
    </div>
    <h1 class="text-4xl font-black tracking-tighter text-white">
      MUST <span class="text-blue-400">AI</span>
    </h1>
    <p class="text-xs text-blue-300 font-bold uppercase tracking-widest mt-2">
      School of Computing Command Center
    </p>
  </div>

  <div
    class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100"
  >
    <h2 class="text-xl font-black text-slate-800 mb-2">
      Administrative Gateway
    </h2>
    <p class="text-slate-500 text-sm mb-8">
      Enter your secure credentials to access the intelligence core.
    </p>

    <div
      id="login-error"
      class="hidden bg-red-50 text-red-600 border border-red-200 p-3 rounded-lg text-xs font-bold mb-6 text-center"
    >
      Invalid credentials.
    </div>

    <div class="space-y-5">
      <div>
        <label
          class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2"
          >Selected Account</label
        >
        <input
          type="text"
          id="login-username"
          placeholder="Select role from the quick panel"
          readonly
          class="w-full bg-slate-100 border-2 border-slate-200 p-4 rounded-xl outline-none text-slate-600 font-bold cursor-not-allowed"
        />
      </div>
      <div>
        <label
          class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2"
          >Passcode</label
        >
        <input
          type="password"
          id="login-password"
          placeholder="Choose role, then enter passcode"
          class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-xl outline-none focus:border-blue-500 transition text-slate-800 font-bold"
        />
      </div>

      <p id="role-hint" class="text-[11px] text-slate-500 font-semibold">
        Pick your role from the bottom-left panel to unlock login.
      </p>

      <button
        onclick="attemptLogin()"
        id="login-btn"
        class="w-full bg-blue-600 text-white font-black py-4 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-500/30 transition-all duration-300 transform hover:-translate-y-1 mt-4"
      >
        AUTHENTICATE
      </button>
    </div>
  </div>

  <div
    class="mt-6 w-full max-w-md md:max-w-none md:w-72 md:absolute md:bottom-6 md:left-6 rounded-2xl border border-blue-400/35 bg-slate-900/80 backdrop-blur-md p-4 shadow-xl"
  >
    <p class="text-[10px] font-black text-blue-200 uppercase tracking-widest">
      Quick Role Access
    </p>
    <p class="text-[11px] text-slate-300 mt-1 mb-3 font-semibold">
      Select account role without typing usernames.
    </p>
    <div class="space-y-2">
      <button
        type="button"
        id="role-btn-cod_cs"
        onclick="selectLoginRole('cod_cs')"
        class="role-btn w-full px-3 py-2.5 rounded-xl border-2 border-slate-700 text-slate-100 bg-slate-800/70 text-xs font-black uppercase tracking-wide hover:border-blue-300 hover:text-blue-100 transition text-left"
      >
        CoD Portal - Computer Science
      </button>
      <button
        type="button"
        id="role-btn-cod_it"
        onclick="selectLoginRole('cod_it')"
        class="role-btn w-full px-3 py-2.5 rounded-xl border-2 border-slate-700 text-slate-100 bg-slate-800/70 text-xs font-black uppercase tracking-wide hover:border-blue-300 hover:text-blue-100 transition text-left"
      >
        CoD Portal - Information Technology
      </button>
      <button
        type="button"
        id="role-btn-cod_ims"
        onclick="selectLoginRole('cod_ims')"
        class="role-btn w-full px-3 py-2.5 rounded-xl border-2 border-slate-700 text-slate-100 bg-slate-800/70 text-xs font-black uppercase tracking-wide hover:border-blue-300 hover:text-blue-100 transition text-left"
      >
        CoD Portal - Info & Media Studies
      </button>
      <button
        type="button"
        id="role-btn-dean"
        onclick="selectLoginRole('dean')"
        class="role-btn w-full px-3 py-2.5 rounded-xl border-2 border-slate-700 text-slate-100 bg-slate-800/70 text-xs font-black uppercase tracking-wide hover:border-blue-300 hover:text-blue-100 transition text-left"
      >
        Dean Portal
      </button>
    </div>
  </div>
</div>
